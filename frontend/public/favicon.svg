<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <!-- Subtle parchment gradient background -->
    <linearGradient id="parchment" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f9f5ef"/>
      <stop offset="100%" stop-color="#f3ede3"/>
    </linearGradient>
  </defs>
  
  <!-- Background circle with parchment fill -->
  <circle cx="16" cy="16" r="15" fill="url(#parchment)" stroke="#1a1a2e" stroke-width="1.5"/>
  
  <!-- Stylized serif "A" for arXiv - editorial/scholarly feel -->
  <g fill="#1a1a2e">
    <!-- Main A shape with serifs -->
    <path d="M16 6 L9 26 L11.5 26 L13 22 L19 22 L20.5 26 L23 26 L16 6 Z M14 19.5 L16 12 L18 19.5 L14 19.5 Z"/>
  </g>
  
  <!-- Small magnifying glass accent in rust color (bottom right) -->
  <g stroke="#b03a2e" stroke-width="1.5" fill="none">
    <circle cx="23" cy="23" r="3.5"/>
    <line x1="25.5" y1="25.5" x2="28" y2="28" stroke-linecap="round"/>
  </g>
</svg>
